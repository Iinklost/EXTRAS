<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Horas Extras</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
padding:30px;
background:#f3f4f6;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
color:#166534;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.field{
display:flex;
flex-direction:column;
}

label{
margin-bottom:8px;
font-weight:bold;
}

input,
select{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;
}

.fixed{
background:#dcfce7;
}

button{
margin-top:30px;
padding:14px 24px;
background:#15803d;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:0.2s;
}

button:hover{
background:#166534;
}

button:disabled{
opacity:0.7;
cursor:not-allowed;
}

</style>

</head>

<body>

<div class="container">

<h1>Sistema Horas Extras</h1>

<div class="grid">

<div class="field">
<label>DNI</label>
<input type="text" id="dni">
</div>

<div class="field">
<label>Apellido Paterno</label>
<input type="text" id="apellidoPaterno">
</div>

<div class="field">
<label>Apellido Materno</label>
<input type="text" id="apellidoMaterno">
</div>

<div class="field">
<label>Nombres</label>
<input type="text" id="nombres">
</div>

<div class="field">
<label>Campaña</label>
<input
class="fixed"
type="text"
value="CLARO MASIVO HFC - TECNICO"
readonly>
</div>

<div class="field">
<label>Ejecutivo</label>
<input
class="fixed"
type="text"
value="VELASQUEZ SULLON SHERLEY JUSSELI"
readonly>
</div>

<div class="field">

<label>Supervisor</label>

<select id="supervisor">

<option value="">
Seleccione
</option>

<option>
ROLDAN BARRIGA ORIS ANYERLIN
</option>

<option>
MARIA FERNANDA VINCES LALUPU
</option>

</select>

</div>

<div class="field">

<label>Condición</label>

<select id="condicion">

<option value="">
Seleccione
</option>

<option>
PART TIME
</option>

<option>
FULL TIME
</option>

</select>

</div>

<div class="field">
<label>Fecha</label>
<input type="date" id="fecha">
</div>

<div class="field">
<label>Hora Inicio</label>
<input type="time" id="horaInicio">
</div>

<div class="field">
<label>Hora Fin</label>
<input type="time" id="horaFin">
</div>

<div class="field">
<label>Pago por Hora</label>
<input type="number" id="pagoHora">
</div>

<div class="field">

<label>OBS</label>

<select id="obs">

<option value="">
Seleccione
</option>

<option>
COMPRA DE BREAK
</option>

<option>
HORARIO REDUCIDO
</option>

</select>

</div>

</div>

<button onclick="guardarDatos()">
Guardar Registro
</button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzNEvJk2IhFF1ayxZPobMsT5s1BJMTS6QwCqQz22Nm3GnKhleXxfWAhIalQhOXi5hjS/exec";

async function guardarDatos(){

const boton =
document.querySelector("button");

boton.disabled = true;
boton.innerText = "Guardando...";

const datos = {

dni:
document.getElementById("dni").value,

apellidoPaterno:
document.getElementById("apellidoPaterno").value,

apellidoMaterno:
document.getElementById("apellidoMaterno").value,

nombres:
document.getElementById("nombres").value,

supervisor:
document.getElementById("supervisor").value,

condicion:
document.getElementById("condicion").value,

fecha:
document.getElementById("fecha").value,

horaInicio:
document.getElementById("horaInicio").value,

horaFin:
document.getElementById("horaFin").value,

pagoHora:
document.getElementById("pagoHora").value,

obs:
document.getElementById("obs").value

};

try{

const respuesta = await fetch(API_URL, {

method:"POST",

body:JSON.stringify(datos)

});

const resultado =
await respuesta.json();

if(resultado.resultado === "ok"){

alert("Registro guardado correctamente");

document
.querySelectorAll("input")
.forEach(input => {

if(!input.readOnly){

input.value = "";
}

});

document
.querySelectorAll("select")
.forEach(select => {

select.selectedIndex = 0;

});

}else{

alert("Error al guardar");

}

}catch(error){

console.error(error);

alert("Error de conexión");

}

finally{

boton.disabled = false;
boton.innerText = "Guardar Registro";

}

}

</script>

</body>
</html>
